<!doctype html>
<html>

<head>

<title>Toasti Admin Login</title>

<style>

body
{
    margin:0;
    font-family:Arial;
    background:url("https://images.unsplash.com/photo-1509440159596-0249088772ff");
    background-size:cover;
}


.overlay
{
    background:rgba(0,0,0,0.6);
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
}


.login-box
{
    background:white;
    padding:40px;
    border-radius:10px;
    width:350px;
    text-align:center;
}


h1
{
    margin-bottom:20px;
}


input
{
    width:100%;
    padding:12px;
    margin-top:10px;
}


button
{
    margin-top:15px;
    width:100%;
    padding:12px;
    background:#8b4513;
    color:white;
    border:none;
    font-size:16px;
}


button:hover
{
    background:#5a2d0c;
}


.error
{
    color:red;
    margin-top:10px;
}

</style>

</head>


<body>


<div class="overlay">


<div class="login-box">


<h1>Bakery Admin Login 🍞</h1>


<form method="POST">


<input name="username" placeholder="Username">


<input name="password" type="password" placeholder="Password">


<button>

Login

</button>


</form>



{% if error %}

<div class="error">

{{ error }}

</div>

{% endif %}



<p style="margin-top:15px; font-size:14px;">

Demo: admin / admin123

</p>



</div>


</div>


</body>

</html>
